spring.application.name=quest-llm

server.port=8081

# LM Studio Configuration
spring.ai.openai.chat.base-url=http://localhost:1234
spring.ai.openai.api-key=lm-studio
spring.ai.openai.chat.options.model=dolphin3-8k

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/notes
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.threads.virtual.enabled=true
# This tells Jackson to use the primitive default (like 0 for long) instead of crashing on null
#spring.jackson.deserialization.fail-on-null-for-primitives=false

spring.kafka.bootstrap-servers=localhost:9094

# -- Kafka Consumer --
# Deserializing bytes back into JSON/Objects
spring.kafka.consumer.group-id=quest-test-1
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# 1. Trust the local package
spring.kafka.consumer.properties.spring.json.trusted.packages=com.solara.quest_llm.models.kafkaDto.requests
# 2. Map the token 'embedding_req' to the local DTO path
spring.kafka.consumer.properties.spring.json.type.mapping=embedding_req:com.solara.quest_llm.models.kafkaDto.requests.NoteEmbeddingRequest
spring.kafka.consumer.auto-offset-reset=earliest

#logging.level.org.springframework.kafka=DEBUG
#logging.level.org.apache.kafka=DEBUG

# spring.kafka.consumer.properties[spring.json.value.default.type]=com.solara.quest_llm.models.kafkaDto.requests.NoteEmbeddingRequest
# spring.kafka.consumer.properties[spring.json.trusted.packages]=com.solara.quest_llm.models.kafkaDto.requests
# Trusted packages is required for JsonDeserializer to prevent security exploits
# spring.kafka.consumer.properties.spring.json.trusted.packages=*


# -- Kafka Producer --
# Serializing the Key as String and Value as JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.type.mapping=embedding_req:com.solara.mnote.models.kafkaDto.requests.NoteEmbeddingResponse


# -- LMStudio configs --
lmstudio.embedding.model=text-embedding-nomic-embed-text-v1.5
lmstudio.model=dolphin3-8k


