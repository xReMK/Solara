spring.application.name=mnote

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/notes
spring.datasource.username=postgres
spring.datasource.password=0000
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.kafka.bootstrap-servers=localhost:9094
# Serializing the Key as String and Value as JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
#spring.kafka.producer.properties[spring.json.add.type.headers]=false
# This adds a simple key instead of the full package path to the header
spring.kafka.producer.properties.spring.json.type.mapping=embedding_req:com.solara.mnote.models.kafkaDto.requests.EmbeddingRequest


